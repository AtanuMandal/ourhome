name: CD Pipeline (DEV → QA → PROD)

# ═══════════════════════════════════════════════════════════════════════════════
# Progressive delivery pipeline for backend + frontend Azure stacks.
#
# Stage order is enforced STRUCTURALLY with `needs:`:
#   deploy-dev  →  deploy-qa  →  deploy-prod
# QA can never run unless DEV succeeded in the same run; PROD can never run
# unless QA succeeded. On top of that, the qa/prod GitHub Environments carry
# required-reviewer protection rules (see setup-environments.yml), so each
# promotion pauses for human approval.
#
# Triggers:
#   - push to main       → full pipeline (pauses at qa/prod approval gates)
#   - workflow_dispatch  → `target` chooses how far to promote (dev / qa / prod)
#
# Each stage is the reusable deploy-stack.yml, which performs blue-green
# deployment (staging-slot swap for Functions, atomic index.html cutover for
# the SPA).
# ═══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Promote up to which environment?'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod

# One pipeline run at a time; queue instead of cancelling to avoid torn deploys.
concurrency:
  group: cd-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # OIDC federated login to Azure (inherited by called workflows)

jobs:
  # ── Stage 1: DEV — always runs ───────────────────────────────────────────────
  deploy-dev:
    name: Stage 1 · DEV
    uses: ./.github/workflows/deploy-stack.yml
    with:
      environment: dev
    secrets: inherit

  # ── Stage 2: QA — only after DEV succeeds ────────────────────────────────────
  deploy-qa:
    name: Stage 2 · QA
    needs: deploy-dev
    if: ${{ github.event_name == 'push' || inputs.target == 'qa' || inputs.target == 'prod' }}
    uses: ./.github/workflows/deploy-stack.yml
    with:
      environment: qa
    secrets: inherit

  # ── Stage 3: PROD — only after QA succeeds ───────────────────────────────────
  deploy-prod:
    name: Stage 3 · PROD
    needs: deploy-qa
    if: ${{ github.event_name == 'push' || inputs.target == 'prod' }}
    uses: ./.github/workflows/deploy-stack.yml
    with:
      environment: prod
    secrets: inherit
