name: Deploy Stack (reusable)

# ═══════════════════════════════════════════════════════════════════════════════
# Reusable workflow that deploys the FULL stack (infra + backend + frontend)
# to ONE environment. Called by cd.yml once per stage (dev → qa → prod).
#
# Every job binds to the GitHub Environment named by `inputs.environment`, so:
#   - per-environment secrets/vars are resolved automatically
#   - qa / prod required-reviewer protection rules gate each stage
#
# Blue-green strategy:
#   Backend  → zip-deploy to the 'staging' slot, warm up + health check (green),
#              swap into production (blue), verify, auto swap-back on failure.
#   Frontend → upload hashed assets first, flip index.html last (atomic cutover),
#              then purge CDN. Blob static websites have no slots, so the
#              index.html flip IS the blue→green switch.
#
# Required per-environment SECRETS:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#   AZURE_RESOURCE_GROUP, JWT_SECRET
# Optional per-environment VARS:
#   APP_NAME (default aptmgmt), API_BASE_URL, FUNCTION_APP_NAME,
#   STORAGE_ACCOUNT_NAME, CDN_PROFILE_NAME, CDN_ENDPOINT_NAME
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment: dev | qa | prod'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # OIDC federated login to Azure

env:
  DOTNET_VERSION: '8.x'
  NODE_VERSION: '20.x'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 – Infrastructure (Bicep). Idempotent; also provisions the staging
  # slot used for blue-green swaps.
  # ─────────────────────────────────────────────────────────────────────────────
  infra:
    name: Infra · ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      function_app_name: ${{ steps.outputs.outputs.function_app_name }}
      function_hostname: ${{ steps.outputs.outputs.function_hostname }}
      storage_account_name: ${{ steps.outputs.outputs.storage_account_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/bicep/main.bicep \
            --parameters \
                environment="${{ inputs.environment }}" \
                appName="${{ vars.APP_NAME || 'aptmgmt' }}" \
                jwtSecret="${{ secrets.JWT_SECRET }}" \
            --name "deploy-${{ inputs.environment }}-${{ github.run_id }}" \
            --output none

      - name: Capture infrastructure outputs
        id: outputs
        run: |
          OUTPUTS=$(az deployment group show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "deploy-${{ inputs.environment }}-${{ github.run_id }}" \
            --query properties.outputs \
            --output json)

          echo "function_app_name=$(echo "$OUTPUTS" | jq -r '.functionAppName.value // empty')" >> "$GITHUB_OUTPUT"
          echo "function_hostname=$(echo "$OUTPUTS" | jq -r '.functionAppHostName.value // empty')" >> "$GITHUB_OUTPUT"
          echo "storage_account_name=$(echo "$OUTPUTS" | jq -r '.storageAccountName.value // empty')" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 – Backend Functions, blue-green via staging slot swap
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (blue-green) · ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: infra
    environment: ${{ inputs.environment }}

    env:
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME || needs.infra.outputs.function_app_name }}
      SLOT_NAME: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore & publish Functions project
        run: |
          dotnet restore apartment_management.sln
          dotnet publish backend/src/ApartmentManagement.Functions/ApartmentManagement.Functions.csproj \
            --configuration Release \
            --output ./publish/functions

      - name: Create deployment package
        run: |
          cd publish/functions
          zip -r ../../function-app.zip .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to GREEN (staging slot)
        run: |
          az functionapp deployment source config-zip \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --slot "$SLOT_NAME" \
            --src ./function-app.zip

      - name: Warm up & health-check GREEN
        run: |
          SLOT_HOST=$(az webapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --slot "$SLOT_NAME" \
            --query defaultHostName -o tsv)

          echo "Warming up https://${SLOT_HOST} ..."
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "https://${SLOT_HOST}/api/health" || echo 000)
            # 404 = host is up but no /api/health function exists; still healthy.
            if [ "$CODE" != "000" ] && [ "$CODE" -lt 500 ]; then
              echo "GREEN healthy after $i attempt(s) (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i/30: HTTP $CODE – retrying in 10s"
            sleep 10
          done
          echo "::error::GREEN slot never became healthy – aborting before swap"
          exit 1

      - name: Swap GREEN → BLUE (staging → production)
        run: |
          az functionapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --slot "$SLOT_NAME" \
            --target-slot production

      - name: Verify BLUE after swap (auto-rollback on failure)
        run: |
          PROD_HOST="${{ needs.infra.outputs.function_hostname }}"
          echo "Verifying https://${PROD_HOST} ..."
          for i in $(seq 1 18); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 20 "https://${PROD_HOST}/api/health" || echo 000)
            if [ "$CODE" != "000" ] && [ "$CODE" -lt 500 ]; then
              echo "Production healthy after swap (HTTP $CODE)"
              exit 0
            fi
            echo "Attempt $i/18: HTTP $CODE – retrying in 10s"
            sleep 10
          done

          echo "::error::Production unhealthy after swap – rolling back (swapping slots again)"
          az functionapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --slot "$SLOT_NAME" \
            --target-slot production
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 – Frontend Angular PWA → Blob $web. Assets first, index.html last
  # (the atomic cutover), CDN purge after.
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: infra
    environment: ${{ inputs.environment }}

    env:
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME || needs.infra.outputs.storage_account_name }}
      API_BASE_URL: ${{ vars.API_BASE_URL || format('https://{0}/api', needs.infra.outputs.function_hostname) }}
      DIST_DIR: frontend/apartment-management/dist/apartment-management/browser

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/apartment-management/package-lock.json

      - name: Inject environment API base URL
        run: |
          cat > frontend/apartment-management/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiBaseUrl: '${API_BASE_URL}'
          };
          EOF
          echo "apiBaseUrl set to ${API_BASE_URL}"

      - name: Install dependencies
        working-directory: frontend/apartment-management
        run: npm ci

      - name: Build Angular PWA
        working-directory: frontend/apartment-management
        run: npm run build -- --configuration production

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload assets (everything except index.html)
        run: |
          STAGE_DIR=$(mktemp -d)
          cp -r "$DIST_DIR"/. "$STAGE_DIR"/
          rm -f "$STAGE_DIR/index.html"

          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT_NAME" \
            --destination '$web' \
            --source "$STAGE_DIR" \
            --overwrite \
            --auth-mode login

      - name: Cut over – publish index.html last
        run: |
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT_NAME" \
            --container-name '$web' \
            --name index.html \
            --file "$DIST_DIR/index.html" \
            --content-cache-control 'no-cache' \
            --overwrite \
            --auth-mode login

      - name: Purge CDN endpoint cache
        if: ${{ vars.CDN_PROFILE_NAME != '' && vars.CDN_ENDPOINT_NAME != '' }}
        run: |
          az cdn endpoint purge \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --profile-name "${{ vars.CDN_PROFILE_NAME }}" \
            --name "${{ vars.CDN_ENDPOINT_NAME }}" \
            --content-paths '/*'
